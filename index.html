        .box {

            color: #888; 
            margin-bottom: 25px; 
        }
        .btn { 
            background: #00ff88; 
            color: #000 !important; 
            padding: 18px 30px; 
            text-decoration: none; 
            font-weight: bold; 
            border-radius: 12px; 
            font-size: 18px; 
            display: block; 
            transition: 0.3s; 
            box-shadow: 0 5px 15px rgba(0, 255, 136, 0.4); 
        }
        .btn:hover {
