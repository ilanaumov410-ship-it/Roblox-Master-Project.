<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>System OS | Bypass</title>
    <style>
        /* ДИЗАЙН КАК В НАСТОЯЩЕЙ ОС */
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            background: url('https://wallpaperaccess.com/full/2454519.jpg') no-repeat center center fixed; 
            background-size: cover; font-family: sans-serif; overflow: hidden;
        }

        /* РАБОЧИЙ СТОЛ С ИКОНКАМИ */
        .desktop {
            display: grid;
            grid-template-columns: repeat(auto-fill, 100px);
            grid-template-rows: repeat(auto-fill, 100px);
            gap: 20px; padding: 30px; height: calc(100vh - 50px);
        }

        .icon {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white; text-align: center; cursor: pointer; border-radius: 10px;
            transition: 0.2s; text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
        }
        .icon:hover { background: rgba(255, 255, 255, 0.1); }
        .icon img { width: 60px; height: 60px; margin-bottom: 8px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .icon span { font-size: 12px; font-weight: bold; }

        /* ОКНО ПРИЛОЖЕНИЯ (ТОЧЬ-В-ТОЧЬ) */
        .window-overlay {
            display: none; position: fixed; top: 0; left: 0; 
            width: 100%; height: 100%; background: #000; z-index: 9999;
        }
        .window-header {
            height: 40px; background: #202225; display: flex; 
            align-items: center; justify-content: space-between; padding: 0 15px;
            border-bottom: 1px solid #000;
        }
        .close-btn { 
            background: #ff5f56; width: 12px; height: 12px; border-radius: 50%; 
            border: none; cursor: pointer; 
        }
        
        iframe { width: 100%; height: calc(100% - 40px); border: none; }

        /* ПАНЕЛЬ ЗАДАЧ */
        .taskbar {
            position: fixed; bottom: 0; width: 100%; height: 45px;
            background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(10px);
            display: flex; align-items: center; justify-content: center; z-index: 10000;
        }
        .start-btn { width: 30px; height: 30px; background: url('https://images.rbxcdn.com/7993077794bc3970726d40dae3b6e792.svg') no-repeat center; background-size: contain; filter: invert(1); }
    </style>
</head>
<body>

    <div class="desktop">
        <div class="icon" onclick="openApp('https://nowgg.lol/play/roblox-corporation/5349/roblox')">
            <img src="https://cdn-icons-png.flaticon.com/512/220/220233.png">
            <span>Roblox</span>
        </div>

        <div class="icon" onclick="openApp('https://discord.com/app')">
            <img src="https://cdn-icons-png.flaticon.com/512/2111/2111370.png">
            <span>Discord</span>
        </div>

        <div class="icon" onclick="openApp('https://nowgg.lol/play/supercell/1234/brawl-stars')">
            <img src="https://cdn-icons-png.flaticon.com/512/889/889102.png">
            <span>Brawl Stars</span>
        </div>
    </div>

    <div class="taskbar">
        <div class="start-btn"></div>
    </div>

    <div id="app-window" class="window-overlay">
        <div class="window-header">
            <div style="color: #ccc; font-size: 13px; font-weight: bold;">System App</div>
            <button class="close-btn" onclick="closeApp()"></button>
        </div>
        <iframe id="view" src="" allow="autoplay; camera; microphone; fullscreen; clipboard-read; clipboard-write;"></iframe>
    </div>

    <script>
        function openApp(url) {
            const win = document.getElementById('app-window');
            const view = document.getElementById('view');
            view.src = url;
            win.style.display = "block";
        }

        function closeApp() {
            const win = document.getElementById('app-window');
            const view = document.getElementById('view');
            view.src = "";
            win.style.display = "none";
        }
    </script>
</body>
</html>
