<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAUMOV SYSTEM</title>
    <style>
        body { background: #0a0a0a; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .panel { border: 2px solid #333; padding: 40px; border-radius: 20px; background: #111; box-shadow: 0 0 30px rgba(0, 0, 0, 0.8); text-align: center; width: 300px; transition: 0.5s; }
        .panel.active { border-color: #00ff88; box-shadow: 0 0 40px rgba(0, 255, 136, 0.3); }
        h1 { font-size: 24px; margin-bottom: 20px; letter-spacing: 2px; }
        
        /* Крутой переключатель */
        .toggle-btn { background: #333; color: #fff; border: none; padding: 15px 30px; font-size: 18px; font-weight: bold; border-radius: 10px; cursor: pointer; transition: 0.3s; width: 100%; margin-bottom: 15px; }
        .toggle-btn.on { background: #ff3333; box-shadow: 0 0 20px rgba(255, 51, 51, 0.5); }
        .toggle-btn.off { background: #00ff88; color: #000; box-shadow: 0 0 20px rgba(0, 255, 136, 0.5); }
        
        #status-text { font-size: 14px; color: #888; font-family: monospace; }
        .active #status-text { color: #00ff88; }
        
        .hidden-link { display: none; margin-top: 20px; color: #00ff88; text-decoration: underline; font-size: 16px; font-weight: bold; }
    </style>
</head>
<body>

<div class="panel" id="main-panel">
    <h1>NAUMOV HUB</h1>
    <button class="toggle-btn off" id="vpn-btn" onclick="toggleVPN()">ВКЛЮЧИТЬ VPN</button>
    <div id="status-text">> СИСТЕМА ОТКЛЮЧЕНА</div>
    
    <a href="https://www.croxyproxy.com/" target="_blank" class="hidden-link" id="roblox-link">ПЕРЕЙТИ К ШЛЮЗУ</a>
</div>

<script>
    let isVpnOn = false;

    function toggleVPN() {
        const btn = document.getElementById('vpn-btn');
        const panel = document.getElementById('main-panel');
        const status = document.getElementById('status-text');
        const link = document.getElementById('roblox-link');

        isVpnOn = !isVpnOn; // Переключаем статус

        if (isVpnOn) {
            // Режим ВКЛ
            btn.innerText = "ОТКЛЮЧИТЬ VPN";
            btn.className = "toggle-btn on";
            panel.className = "panel active";
            status.innerText = "> СОЕДИНЕНИЕ УСТАНОВЛЕНО. ТРАФИК ЗАЩИЩЕН.";
            link.style.display = "block"; // Показываем ссылку
        } else {
            // Режим ВЫКЛ
            btn.innerText = "ВКЛЮЧИТЬ VPN";
            btn.className = "toggle-btn off";
            panel.className = "panel";
            status.innerText = "> СИСТЕМА ОТКЛЮЧЕНА";
            link.style.display = "none"; // Прячем ссылку
        }
    }
</script>

</body>
</html>
