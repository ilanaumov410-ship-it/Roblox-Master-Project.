<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Roblox</title>
    <link rel="icon" href="https://www.roblox.com/favicon.ico">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #1B1D1E; overflow: hidden; }
        
        /* Твоя заставка - в точности как у РБ */
        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #232527; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 9999;
        }
        .rbx-logo { width: 75px; height: 75px; margin-bottom: 25px; }
        .spin { width: 35px; height: 35px; border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid #fff; border-radius: 50%; animation: s 1s linear infinite; }
        @keyframes s { to { transform: rotate(360deg); } }

        /* САМОЕ ВАЖНОЕ: Открываем чистый домен РБ */
        #game-view {
            width: 100%; height: 100%; border: none;
            position: absolute; top: 0; left: 0;
            display: block;
        }
    </style>
</head>
<body>

    <div id="loading-screen">
        <img src="https://images.rbxcdn.com/7993077794bc3970726d40dae3b6e792.svg" class="rbx-logo">
        <div class="spin"></div>
        <p style="color: white; font-family: sans-serif; margin-top: 20px; font-weight: bold; letter-spacing: 1px;">NAUMOV ENGINE</p>
    </div>

    <iframe id="game-view" src="https://www.roblox.com/home"></iframe>

    <script>
        const frame = document.getElementById('game-view');
        const loader = document.getElementById('loading-screen');

        // Скрываем заставку только когда Роблокс загрузится
        frame.onload = function() {
            setTimeout(() => {
                loader.style.opacity = '0';
                setTimeout(() => { loader.style.display = 'none'; }, 500);
            }, 1500);
        };
    </script>
</body>
</html>
