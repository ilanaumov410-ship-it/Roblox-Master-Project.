<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAUMOV ROBLOX HUB</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; }
        #start-screen {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; color: #00ff88; text-align: center;
            background: radial-gradient(circle, #111 0%, #000 100%);
        }
        .v-card { border: 2px solid #00ff88; padding: 50px; border-radius: 30px; box-shadow: 0 0 40px #00ff8833; }
        .go-btn {
            background: #00ff88; color: #000; border: none; padding: 20px 50px;
            font-size: 20px; font-weight: bold; border-radius: 15px; cursor: pointer; transition: 0.3s;
        }
        .go-btn:hover { transform: scale(1.1); box-shadow: 0 0 30px #00ff88; }
        #game-frame { width: 100%; height: 100%; border: none; display: none; }
        .loading-text { margin-top: 20px; font-family: monospace; font-size: 14px; display: none; }
    </style>
</head>
<body>

    <div id="start-screen">
        <div class="v-card">
            <h1 style="letter-spacing: 5px;">NAUMOV VPN</h1>
            <p style="color: #666; margin-bottom: 30px;">ULTRA SPEED BYPASS</p>
            <button class="go-btn" onclick="launch()">ВКЛЮЧИТЬ И ИГРАТЬ</button>
            <div class="loading-text" id="loader">ПОДКЛЮЧЕНИЕ К СЕРВЕРУ...</div>
        </div>
    </div>

    <iframe id="game-frame" src=""></iframe>

    <script>
        function launch() {
            document.querySelector('.go-btn').style.display = 'none';
            document.getElementById('loader').style.display = 'block';

            setTimeout(() => {
                document.getElementById('start-screen').style.display = 'none';
                const frame = document.getElementById('game-frame');
                frame.style.display = 'block';
                // Прямой вход в Roblox. 
                // ВНИМАНИЕ: Чтобы это сработало на 100% без лагов, 
                // просто включи любой впн на телефоне перед входом на сайт.
                frame.src = "https://www.roblox.com/home";
            }, 2000);
        }
    </script>
</body>
</html>
