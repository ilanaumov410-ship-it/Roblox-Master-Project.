<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox</title>
    <link rel="icon" href="https://www.roblox.com/favicon.ico">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #000; overflow: hidden; }
        
        /* Слой загрузки в стиле Roblox */
        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #232527; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 9999;
            transition: opacity 1s;
        }
        .rbx-logo { width: 80px; height: 80px; margin-bottom: 20px; }
        .spinner {
            width: 40px; height: 40px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top: 4px solid #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Окно с самой игрой */
        iframe {
            width: 100%; height: 100%; border: none;
            display: block; position: absolute; top: 0; left: 0;
        }
    </style>
</head>
<body>

    <div id="loading-screen">
        <img src="https://images.rbxcdn.com/7993077794bc3970726d40dae3b6e792.svg" class="rbx-logo" alt="R">
        <div class="spinner"></div>
        <p style="color: white; font-family: sans-serif; margin-top: 15px; font-weight: bold;">Загрузка системы обхода...</p>
    </div>

    <iframe id="main-target" src=""></iframe>

    <script>
        // Мы используем самый быстрый сервер, который "прикидывается" обычным сайтом
        const gateway = "https://www.croxyproxy.com/_ru/_proxy?url=https%3A%2F%2Fwww.roblox.com%2Fhome";
        
        const frame = document.getElementById('main-target');
        const loader = document.getElementById('loading-screen');

        // Загружаем игру
        frame.src = gateway;

        // Прячем загрузку, когда шлюз ответит
        frame.onload = function() {
            setTimeout(() => {
                loader.style.opacity = '0';
                setTimeout(() => { loader.style.display = 'none'; }, 1000);
            }, 500);
        };
    </script>
</body>
</html>
