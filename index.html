<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox</title>
    <link rel="icon" href="https://www.roblox.com/favicon.ico">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #1b1d1e; overflow: hidden; }
        
        /* Твой собственный экран загрузки */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #1b1d1e; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 100;
        }
        .logo { width: 60px; margin-bottom: 20px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }

        /* Окно с игрой - растянуто на весь экран */
        iframe {
            width: 100%; height: 100%; border: none;
            position: absolute; top: 0; left: 0;
        }
    </style>
</head>
<body>

    <div id="loader">
        <img src="https://images.rbxcdn.com/7993077794bc3970726d40dae3b6e792.svg" class="logo">
        <p style="color: white; font-family: sans-serif; font-size: 14px;">ЗАПУСК NAUMOV BYPASS...</p>
    </div>

    <iframe id="rbx" src="https://www.croxyproxy.com/_ru/_proxy?url=https%3A%2F%2Fwww.roblox.com%2Fhome"></iframe>

    <script>
        const frame = document.getElementById('rbx');
        const loader = document.getElementById('loader');

        // Когда игра загрузится, убираем твой экран загрузки
        frame.onload = function() {
            setTimeout(() => {
                loader.style.display = 'none';
            }, 1000);
        };
    </script>
</body>
</html>
