<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAUMOV SUPREME VPN</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; font-family: sans-serif; overflow: hidden; }
        #ui { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; color: #00ff88; text-align: center; }
        .box { border: 2px solid #00ff88; padding: 30px; border-radius: 20px; background: #0a0a0a; box-shadow: 0 0 40px #00ff8855; width: 280px; }
        .key { font-size: 40px; margin-bottom: 10px; opacity: 0.3; transition: 1s; }
        .active .key { opacity: 1; text-shadow: 0 0 20px #00ff88; transform: scale(1.2); }
        .btn { background: #00ff88; color: #000; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; }
        #loader { display: none; margin-top: 15px; width: 100%; height: 4px; background: #222; border-radius: 2px; overflow: hidden; }
        #fill { width: 0%; height: 100%; background: #00ff88; transition: 8s linear; }
        iframe { width: 100%; height: 100%; border: none; display: none; }
    </style>
</head>
<body>

    <div id="ui">
        <div class="box" id="panel">
            <div class="key">🔑</div>
            <h2 style="margin: 10px 0;">NAUMOV VPN</h2>
            <p style="font-size: 12px; color: #666;">SERVER: BELARUS_MINSK_1</p>
            <button class="btn" onclick="start()">ВКЛЮЧИТЬ И ИГРАТЬ</button>
            <div id="loader"><div id="fill"></div></div>
            <p id="status" style="font-size: 10px; margin-top: 10px; color: #444;"></p>
        </div>
    </div>

    <iframe id="game" src=""></iframe>

    <script>
        function start() {
            const btn = document.querySelector('.btn');
            const loader = document.getElementById('loader');
            const fill = document.getElementById('fill');
            const status = document.getElementById('status');
            const panel = document.getElementById('panel');

            btn.style.display = 'none';
            loader.style.display = 'block';
            panel.parentElement.classList.add('active');

            status.innerText = "ШИФРОВАНИЕ КАНАЛА...";
            setTimeout(() => { fill.style.width = '100%'; }, 100);
            
            setTimeout(() => { status.innerText = "ПОДКЛЮЧЕНИЕ К РОБЛОКС..."; }, 4000);

            setTimeout(() => {
                document.getElementById('ui').style.display = 'none';
                const frame = document.getElementById('game');
                frame.style.display = 'block';
                // Самый надежный "мост" на сегодня
                frame.src = "https://www.croxyproxy.com/_ru/_proxy?url=https%3A%2F%2Fwww.roblox.com%2Fhome";
            }, 8500);
        }
    </script>
</body>
</html>
