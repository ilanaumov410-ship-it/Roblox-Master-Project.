<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Roblox Launcher</title>
    <link rel="icon" href="https://www.roblox.com/favicon.ico">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #1B1D1E; color: white; font-family: sans-serif; overflow: hidden; }
        #launcher { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center; background: radial-gradient(circle, #252728 0%, #1B1D1E 100%); }
        .logo { width: 80px; margin-bottom: 25px; filter: drop-shadow(0 0 10px rgba(255,255,255,0.2)); }
        .btn-play { background: #FFFFFF; color: #000000; border: none; padding: 18px 60px; font-size: 18px; font-weight: bold; border-radius: 8px; cursor: pointer; transition: 0.2s; text-transform: uppercase; letter-spacing: 1px; }
        .btn-play:hover { background: #f0f0f0; transform: scale(1.02); }
        .footer { position: absolute; bottom: 20px; font-size: 10px; color: #555; letter-spacing: 2px; }
        #game-box { width: 100%; height: 100%; display: none; border: none; }
    </style>
</head>
<body>

    <div id="launcher">
        <img src="https://images.rbxcdn.com/7993077794bc3970726d40dae3b6e792.svg" class="logo">
        <h1 style="margin-bottom: 40px; font-weight: 500;">ROBLOX</h1>
        <button class="btn-play" onclick="launchGame()">Играть</button>
        <div class="footer">NAUMOV PRIVATE SYSTEM v18.0</div>
    </div>

    <iframe id="game-box" src=""></iframe>

    <script>
        function launchGame() {
            const l = document.getElementById('launcher');
            const g = document.getElementById('game-box');
            
            l.style.display = 'none';
            g.style.display = 'block';
            
            // Используем защищенный "облачный" шлюз, который открывает РБ без ВПН
            g.src = "https://nowgg.lol/play/roblox-corporation/5349/roblox";
        }
    </script>
</body>
</html>
