<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAUMOV VPN ULTIMATE</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: #00ff88; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        #launcher { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center; background: radial-gradient(circle, #111 0%, #000 100%); }
        .vpn-card { border: 2px solid #00ff88; padding: 40px; border-radius: 30px; background: rgba(10, 10, 10, 0.9); box-shadow: 0 0 70px rgba(0, 255, 136, 0.2); width: 300px; }
        .key-glow { font-size: 60px; margin-bottom: 20px; text-shadow: 0 0 20px #00ff88; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
        .connect-btn { background: #00ff88; color: #000; border: none; padding: 20px; width: 100%; border-radius: 15px; font-weight: bold; font-size: 18px; cursor: pointer; box-shadow: 0 5px 15px rgba(0, 255, 136, 0.4); }
        .status { margin-top: 20px; font-family: monospace; font-size: 12px; color: #00ff88; height: 20px; }
        #game-frame { width: 100%; height: 100%; border: none; display: none; }
    </style>
</head>
<body>

    <div id="launcher">
        <div class="vpn-card">
            <div class="key-glow">🔑</div>
            <h1 style="letter-spacing: 5px; margin: 0;">NAUMOV</h1>
            <p style="color: #555; font-size: 12px; margin-bottom: 30px;">PRIVATE BYPASS SERVER</p>
            <button class="connect-btn" onclick="runVPN()">ВКЛЮЧИТЬ VPN</button>
            <div class="status" id="st">READY TO CONNECT</div>
        </div>
    </div>

    <iframe id="game-frame" src=""></iframe>

    <script>
        function runVPN() {
            const st = document.getElementById('st');
            const btn = document.querySelector('.connect-btn');
            const frame = document.getElementById('game-frame');
            const launcher = document.getElementById('launcher');

            btn.style.display = 'none';
            st.innerText = "> INITIALIZING SECURE TUNNEL...";
            
            setTimeout(() => { st.innerText = "> CONNECTING TO MINSK_NODE..."; }, 2000);
            setTimeout(() => { st.innerText = "> BYPASSING FIREWALL... [OK]"; }, 4500);
            setTimeout(() => { st.innerText = "> LAUNCHING ROBLOX..."; }, 6500);

            setTimeout(() => {
                launcher.style.display = 'none';
                frame.style.display = 'block';
                // Используем самый стабильный и быстрый метод запуска
                frame.src = "https://blockaway.net/_ru/_proxy?url=https%3A%2F%2Fwww.roblox.com%2Fhome";
            }, 8000);
        }
    </script>
</body>
</html>
