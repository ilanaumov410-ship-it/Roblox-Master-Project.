<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UNBLOCKER PORTAL</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #0b0b0b; color: white; font-family: sans-serif; overflow: hidden; }
        
        /* ГЛАВНОЕ МЕНЮ */
        #menu {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; gap: 20px; padding: 20px; text-align: center;
        }
        h1 { font-size: 24px; letter-spacing: 2px; color: #00A2FF; margin-bottom: 30px; }

        .launcher-btn {
            background: #1c1c1c; border: 1px solid #333; color: #fff; width: 100%; max-width: 350px;
            padding: 20px; border-radius: 12px; cursor: pointer; font-size: 18px; font-weight: bold;
            transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 15px;
        }
        .launcher-btn:hover { background: #00A2FF; border-color: #fff; transform: scale(1.02); }
        .launcher-btn img { width: 24px; filter: invert(1); }

        /* ИГРОВОЙ ЭКРАН */
        #portal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; }
        iframe { width: 100%; height: 100%; border: none; }
        
        .back-btn {
            position: fixed; top: 10px; left: 10px; z-index: 10001;
            background: rgba(255, 0, 0, 0.8); color: white; border: none;
            padding: 8px 15px; border-radius: 5px; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>

<div id="menu">
    <h1>BYPASS LAUNCHER v35</h1>
    
    <button class="launcher-btn" onclick="openGame('https://nowgg.lol/play/roblox-corporation/5349/roblox')">
        <img src="https://cdn-icons-png.flaticon.com/512/220/220233.png"> ROBLOX (БЕЗ ВПН)
    </button>

    <button class="launcher-btn" onclick="openGame('https://nowgg.lol/play/supercell/1234/brawl-stars')">
        <img src="https://cdn-icons-png.flaticon.com/512/889/889102.png"> BRAWL STARS
    </button>

    <button class="launcher-btn" onclick="openGame('https://discord.com/app')">
        <img src="https://cdn-icons-png.flaticon.com/512/2111/2111370.png"> DISCORD
    </button>

    <button class="launcher-btn" onclick="openGame('https://www.tiktok.com/')">
        <img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png"> TIKTOK (НОВЫЕ ВИДЕО)
    </button>

    <p style="color: #444; font-size: 11px; margin-top: 50px;">SECURE TUNNEL ACTIVE | GITHUB MIRROR</p>
</div>

<div id="portal">
    <button class="back-btn" onclick="closeGame()">ВЫЙТИ В МЕНЮ</button>
    <iframe id="engine" src="" allow="autoplay; camera; microphone; fullscreen; clipboard-read; clipboard-write;"></iframe>
</div>

<script>
    function openGame(url) {
        const portal = document.getElementById('portal');
        const engine = document.getElementById('engine');
        engine.src = url;
        portal.style.display = "block";
    }

    function closeGame() {
        const portal = document.getElementById('portal');
        const engine = document.getElementById('engine');
        engine.src = "";
        portal.style.display = "none";
    }
</script>

</body>
</html>
