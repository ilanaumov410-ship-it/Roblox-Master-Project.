<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Naumov Bypass v27.0</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #0a0a0a; color: #00ff00; font-family: 'Courier New', monospace; overflow: hidden; }
        
        #terminal { padding: 20px; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        
        .glitch { font-size: 30px; font-weight: bold; text-transform: uppercase; position: relative; text-shadow: 0.05em 0 0 #00ff00, -0.025em -0.05em 0 #ff0000, 0.025em 0.05em 0 #0000ff; animation: glitch 1s infinite; }
        @keyframes glitch { 0% { text-shadow: 0.05em 0 0 #00ff00; } 14% { text-shadow: 0.05em 0 0 #00ff00; } 15% { text-shadow: -0.05em -0.025em 0 #ff0000; } 49% { text-shadow: -0.05em -0.025em 0 #ff0000; } 50% { text-shadow: 0.025em 0.05em 0 #0000ff; } 99% { text-shadow: 0.025em 0.05em 0 #0000ff; } 100% { text-shadow: -0.025em 0 0 #00ff00; } }

        .btn-bypass {
            background: transparent; border: 2px solid #00ff00; color: #00ff00;
            padding: 15px 40px; font-size: 18px; font-family: 'Courier New', monospace;
            cursor: pointer; margin-top: 30px; transition: 0.3s; text-transform: uppercase;
        }
        .btn-bypass:hover { background: #00ff00; color: #000; box-shadow: 0 0 20px #00ff00; }

        #game-window { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; border: none; z-index: 9999; }
        .back-btn { position: fixed; top: 10px; right: 10px; z-index: 10000; background: #ff0000; color: white; border: none; padding: 5px 10px; cursor: pointer; display: none; }
    </style>
</head>
<body>

<div id="terminal">
    <div class="glitch">ROBLOX BYPASS</div>
    <p style="margin-top: 20px;">[ SYSTEM: ONLINE ]</p>
    <p id="status">> WAITING FOR SELECTION...</p>
    
    <button class="btn-bypass" onclick="startBypass()">ACTIVATE TUNNEL</button>
    
    <div style="margin-top: 50px; color: #444; font-size: 10px;">
        NODE: IL-NAUMOV-410<br>
        STATUS: NO-VPN ENCRYPTION ACTIVE
    </div>
</div>

<button class="back-btn" id="back" onclick="stopBypass()">EXIT</button>
<iframe id="game-window" src=""></iframe>

<script>
    function startBypass() {
        const status = document.getElementById('status');
        const frame = document.getElementById('game-window');
        const back = document.getElementById('back');
        
        status.innerText = "> INJECTING SCRIPTS...";
        
        setTimeout(() => {
            status.innerText = "> BYPASSING FIREWALL...";
        }, 1000);

        setTimeout(() => {
            status.innerText = "> LOADING CLOUD ENGINE...";
            // Это ссылка на облачную версию, которая работает везде
            frame.src = "https://nowgg.lol/play/roblox-corporation/5349/roblox";
            frame.style.display = "block";
            back.style.display = "block";
        }, 2000);
    }

    function stopBypass() {
        location.reload();
    }
</script>

</body>
</html>
