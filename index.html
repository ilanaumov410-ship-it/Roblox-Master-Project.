<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAUMOV VPN SYSTEM</title>
    <style>
        body { background: #000; color: #00ff88; font-family: 'Courier New', monospace; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .panel { border: 3px solid #00ff88; padding: 40px; border-radius: 20px; background: #050505; box-shadow: 0 0 60px rgba(0, 255, 136, 0.5); text-align: center; width: 350px; }
        h1 { font-size: 26px; letter-spacing: 4px; margin-bottom: 30px; }
        
        .progress-box { display: none; margin-top: 20px; }
        .bar-bg { width: 100%; height: 10px; background: #111; border: 1px solid #00ff88; border-radius: 5px; overflow: hidden; }
        .bar-fill { height: 100%; width: 0%; background: #00ff88; transition: 10s linear; box-shadow: 0 0 15px #00ff88; }
        
        .btn { background: #00ff88; color: #000; padding: 20px; border: none; border-radius: 12px; font-weight: bold; font-size: 18px; cursor: pointer; width: 100%; transition: 0.3s; }
        .btn:hover { background: #fff; transform: scale(1.03); }
        .status-msg { margin-top: 15px; font-size: 12px; height: 20px; }
    </style>
</head>
<body>

<div class="panel">
    <h1>NAUMOV VPN</h1>
    <button class="btn" id="start-btn" onclick="startBypass()">АКТИВИРОВАТЬ ТУННЕЛЬ</button>
    
    <div class="progress-box" id="p-box">
        <div class="bar-bg"><div class="bar-fill" id="fill"></div></div>
        <div class="status-msg" id="msg">СОЕДИНЕНИЕ С БЕЛАРУСЬЮ...</div>
    </div>
</div>

<script>
function startBypass() {
    const btn = document.getElementById('start-btn');
    const box = document.getElementById('p-box');
    const fill = document.getElementById('fill');
    const msg = document.getElementById('msg');

    btn.style.display = 'none';
    box.style.display = 'block';

    // Запускаем шкалу на 10 секунд
    setTimeout(() => { fill.style.width = '100%'; }, 100);

    // Меняем сообщения для эффекта "работы ВПН"
    setTimeout(() => { msg.innerText = "> ПОИСК СВОБОДНОГО IP..."; }, 3000);
    setTimeout(() => { msg.innerText = "> ШИФРОВАНИЕ ТРАФИКА..."; }, 6000);
    setTimeout(() => { msg.innerText = "> ПЕРЕХОД В ROBLOX..."; }, 9000);

    // Ровно через 10 секунд перекидываем в игру через самый стабильный шлюз
    setTimeout(() => {
        window.location.href = "https://blockaway.net/_ru/_proxy?url=https%3A%2F%2Fwww.roblox.com%2Fhome";
    }, 10000);
}
</script>

</body>
</html>
